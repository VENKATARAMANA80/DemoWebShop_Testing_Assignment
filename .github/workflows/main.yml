name: Selenium Tests CI

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Project
      run: cd DemoWebShop_Testing_Assignment && mvn clean install -DskipTests

    - name: Run Tests
      run: cd DemoWebShop_Testing_Assignment && mvn test
